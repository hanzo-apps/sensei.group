# Canonical CI/CD — imports the shared hanzoai/ci reusable workflow, which reads
# hanzo.yml (images) and builds + pushes on our self-hosted arc pool. No per-repo
# build logic, no GitHub-hosted runners.
name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  cicd:
    uses: hanzoai/ci/.github/workflows/build.yml@v1
    # Target the active Hanzo apps arc scale set by its installation name. ARC
    # scale sets match by name, not by the [self-hosted,linux,amd64] label
    # triple ci@v1 defaults to — without this override the job sits queued.
    with:
      runner: '["hanzo-apps-build-linux-amd64"]'
    secrets: inherit
